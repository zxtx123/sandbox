<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>从快照创建沙箱 - 360智汇云</title>
  <link rel="stylesheet" href="styles/sandbox-shell.css">
  <link rel="stylesheet" href="styles/ai-sandbox.css">
  <style>
    * { box-sizing:border-box; }
    .page { padding:24px; min-height:100%; color:#333; font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .main-content { min-width:0; overflow:auto; }
    .breadcrumb { display:flex; gap:8px; align-items:center; height:32px; margin-bottom:16px; color:#666; }
    .breadcrumb a { color:#666; text-decoration:none; }
    .breadcrumb strong { color:#333; }
    .surface { padding:24px; min-height:calc(100vh - 96px); background:#fff; border-radius:4px; }
    .section-title { margin:0 0 20px; padding-bottom:12px; border-bottom:1px solid #f0f0f0; font-size:15px; font-weight:600; }
    .form-group { display:flex; align-items:flex-start; margin-bottom:24px; max-width:920px; }
    .label { flex:0 0 140px; padding-top:7px; color:#333; font-weight:500; }
    .required { color:#ff4d4f; }
    .control { flex:1; min-width:0; }
    .input { width:100%; height:32px; padding:0 10px; border:1px solid #d9d9d9; border-radius:4px; outline:none; background:#fff; color:#333; }
    .timeout-input { max-width:200px; }
    .timeout-unit { margin-left:8px; color:#999; line-height:32px; }
    .input:focus { border-color:#0066ff; }
    .readonly { padding:7px 10px; min-height:32px; background:#f5f5f5; border:1px solid #e6e6e6; border-radius:4px; color:#666; line-height:16px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 16px; padding:16px; background:#f8f9fa; border:1px solid #e6e6e6; border-radius:4px; }
    .meta-label { margin-bottom:4px; color:#999; font-size:12px; }
    .notice { margin-left:140px; max-width:780px; padding:10px 12px; border:1px solid #91caff; border-radius:4px; background:#e6f4ff; color:#0958d9; font-size:12px; line-height:1.6; }
    .actions { display:flex; justify-content:flex-end; gap:12px; margin-top:32px; }
    .btn { height:32px; padding:0 14px; border:1px solid #d9d9d9; border-radius:4px; background:#fff; color:#333; text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    .btn:hover { border-color:#0066ff; color:#0066ff; }
    .primary { border-color:#0066ff; background:#0066ff; color:#fff; }
    .primary:hover { background:#0052cc; color:#fff; }
    .empty { padding:80px 24px; text-align:center; color:#999; }
  </style>
</head>
<body>
  <div id="sandbox-shell" data-active="沙箱快照" data-breadcrumb="从快照创建"></div>
  <main class="main-content">
    <div class="breadcrumb">
      <span class="breadcrumb-left" id="menu-name-display">
        <a href="sandbox-snapshots.html">沙箱快照</a>
        <span class="breadcrumb-sep">&gt;</span>
        <span>从快照创建</span>
      </span>
    </div>
    <div class="content-body">
      <div class="page">
    <section class="surface" id="content" hidden>
      <h1 class="section-title">从快照创建沙箱实例</h1>
      <div class="form-group"><div class="label">来源快照</div><div class="control"><div class="readonly" id="snapshot-source"></div></div></div>
      <div class="form-group"><div class="label">快照创建时间</div><div class="control"><div class="readonly" id="snapshot-created-at"></div></div></div>
      <div class="form-group"><div class="label">沙箱类型</div><div class="control"><div class="readonly">代码沙箱</div></div></div>
      <div class="form-group"><div class="label">继承配置</div><div class="control"><div class="grid"><div><div class="meta-label">来源沙箱</div><div id="snapshot-sandbox"></div></div><div><div class="meta-label">模板</div><div id="snapshot-template"></div></div><div><div class="meta-label">CPU</div><div id="snapshot-cpu"></div></div><div><div class="meta-label">内存</div><div id="snapshot-memory"></div></div></div></div></div>
      <div class="form-group"><label class="label" for="timeout">超时时间 <span class="required">*</span></label><div class="control"><input id="timeout" class="input timeout-input" type="number" value="600" min="1"><span class="timeout-unit">秒（新实例最长运行时间）</span></div></div>
      <div class="notice">创建后将得到一个基于此快照的独立新沙箱。源实例和快照不会被修改，资源配置将从快照继承。</div>
      <div class="actions"><a class="btn" href="sandbox-snapshots.html">取消</a><button class="btn primary" id="create-btn" type="button">创建沙箱</button></div>
    </section>
    <section class="surface empty" id="not-found" hidden><p>未找到对应的可用快照。</p><a class="btn primary" href="sandbox-snapshots.html">返回快照列表</a></section>
      </div>
    </div>
  </main>
  <script>
    const SNAPSHOTS_KEY = 'sandboxSnapshots';
    const INSTANCES_KEY = 'sandboxSnapshotInstances';
    const snapshotId = new URLSearchParams(location.search).get('id');
    const snapshots = JSON.parse(sessionStorage.getItem(SNAPSHOTS_KEY) || '[]');
    const snapshot = snapshots.find(item => item.id === snapshotId);
    const text = (id, value) => document.getElementById(id).textContent = value || '-';
    if (!snapshot || snapshot.status !== 'ready') {
      document.getElementById('not-found').hidden = false;
    } else {
      document.getElementById('content').hidden = false;
      text('snapshot-source', `${snapshot.name} (${snapshot.id})`);
      text('snapshot-created-at', snapshot.createdAt);
      text('snapshot-sandbox', snapshot.sourceSandboxId);
      text('snapshot-template', snapshot.template);
      text('snapshot-cpu', snapshot.cpu);
      text('snapshot-memory', snapshot.memory);
      document.getElementById('create-btn').addEventListener('click', () => {
        const timeout = Number(document.getElementById('timeout').value);
        if (!timeout || timeout <= 0) { alert('请输入有效的超时时间'); return; }
        const instances = JSON.parse(sessionStorage.getItem(INSTANCES_KEY) || '[]');
        instances.unshift({
          id: `sandbox-snapshot-${Date.now().toString(36)}`,
          template: snapshot.template,
          cpu: snapshot.cpu,
          memory: snapshot.memory,
          metadata: `snapshot:${snapshot.id}`,
          timeout,
          status: 'running',
          createdAt: new Date().toLocaleString('zh-CN', { hour12:false }).replace(/\//g, '-')
        });
        sessionStorage.setItem(INSTANCES_KEY, JSON.stringify(instances));
        alert('已从快照创建新的独立沙箱实例。');
        location.href = 'index.html';
      });
    }
  </script>
  <script src="styles/sandbox-shell.js"></script>
</body>
</html>
