<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建沙箱实例 - 360智汇云</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    a {
      text-decoration: none;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F5F7;
      font-size: 14px;
      color: #202020;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ========== 顶部导航栏 ========== */
    .header {
      height: 50px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(49, 49, 71, 0.26);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 177px;
      height: 28px;
    }

    .logo-text {
      display: none;
    }

    .header-btn {
      padding: 6px 12px;
      border-radius: 4px;
      background: #F8F9FA;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      color: #202020;
      border: 1px #F8F9FA solid;
    }

    .header-btn:hover {
      background: #F8F9FA;
      color: #202020;
    }

    .header-btn.group {
      background: #fff;
      border-color: #D8E0E8;
      color: #202020;
      padding: 6px 10px;
    }

    .header-btn.group:hover {
      background: #F8F9FA;
    }

    .tag {
      background: #EEF6FF;
      color: #0066FF;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .dropdown-arrow {
      margin-left: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-divider {
      width: 1px;
      height: 50px;
      background: #F5F5F5;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-link {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      position: relative;
      cursor: pointer;
      transition: color 0.2s;
    }

    .header-link:hover {
      color: #0066FF;
    }

    .header-link .dot {
      position: absolute;
      top: -2px;
      right: -6px;
      width: 6px;
      height: 6px;
      background: #FF4D4F;
      border-radius: 50%;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .user-info:hover {
      background: #F5F7FA;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0066FF;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    .user-detail {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      color: #333;
      line-height: 1.3;
    }

    .user-sub {
      font-size: 12px;
      color: #8C9AAE;
      line-height: 1.3;
    }

    /* ========== 主体容器（三栏布局） ========== */
    .container {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ========== 第一栏：左侧图标栏 ========== */
    .icon-bar {
      width: 50px;
      background: #2e8cff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-item {
      width: 50px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #E5EAF3;
      transition: all 0.2s;
      background: transparent;
      position: relative;
    }

    /* 前三个图标高度为50px */
    .icon-item:nth-child(1),
    .icon-item:nth-child(2),
    .icon-item:nth-child(3) {
      height: 50px;
    }

    .icon-item:hover {
      background: #0066FF;
      color: #fff;
    }

    .icon-item.active {
      background: #0066FF;
      color: #fff;
    }

    .icon-item .icon-svg {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 前三个图标内的svg大小为20px */
    .icon-item:nth-child(1) .icon-svg,
    .icon-item:nth-child(2) .icon-svg,
    .icon-item:nth-child(3) .icon-svg {
      width: 20px;
      height: 20px;
    }

    .icon-item .icon-text {
      font-size: 9px;
      font-weight: 500;
    }

    .icon-item .icon-label {
      display: none;
      font-size: 10px;
      font-weight: 400;
      margin-top: 2px;
    }

    /* 所有图标显示文字标签 */
    .icon-item .icon-label {
      display: block;
    }

    /* 所有图标改为纵向布局 */
    .icon-item {
      flex-direction: column;
    }

    /* ========== 第二栏：中间菜单栏 ========== */
    .sidebar {
      width: 200px;
      background: #ffffff;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      border-right: 1px solid #E6E6e6;
      color: #202020;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    .sidebar-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 一级菜单 */
    .menu-level-1 {
      color: #202020;
      font-size: 14px;
    }

    .menu-level-1 > .menu-item {
      border-bottom: 1px solid #E6E6e6;
    }

    .menu-level-1 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-1 > .menu-item .menu-arrow {
      pointer-events: none;
    }

    .menu-level-1 > .menu-item .menu-arrow .star-icon {
      width: 18px;
      height: 18px;
      color: #999999;
      fill: transparent;
      transition: all 0.2s ease;
    }

    .menu-level-1 > .menu-item.selected .menu-arrow .star-icon {
      color: #0066FF;
      fill: #0066FF;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 50px;
      line-height: 50px;
      color: #202020;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      color: inherit;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-item.active {
      background: #0066FF;
      color: #fff;
    }

    .menu-item.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #fff;
      border-radius: 1px 0 0 1px;
    }

    .menu-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
    }

    .menu-text {
      flex: 1;
      font-size: inherit;
    }

    .menu-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202020;
      transition: transform 0.2s ease;
    }

    .menu-item.collapsed .menu-arrow {
      transform: rotate(-90deg);
    }

    /* 二级菜单（深色背景） */
    .menu-level-2 {
      background:#ffffff;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-2.collapsed {
      max-height: 0;
    }

    .menu-level-2 .menu-item {
      font-size: 14px;
      color: #202020;
      padding-left: 16px;
    }

    .menu-level-2 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-2 .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 展开的子菜单（浅色背景） */
    .submenu-expanded {
      background: #ffffff;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .submenu-expanded.collapsed {
      max-height: 0;
    }

    .menu-level-2.collapsed .submenu-expanded {
      max-height: 0;
    }

    .submenu-expanded .menu-item {
      color: #202020;
      height: 40px;
      line-height: 40px;
      padding: 0 16px 0 16px;
      font-size: 14px;
    }

    .submenu-expanded .menu-item:hover {
      background: #f5f5f5;
    }

    .submenu-expanded .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .submenu-expanded .menu-item.active::after {
      display: none;
    }

    .submenu-expanded .menu-item.active::before {
      display: none;
    }

    .submenu-expanded .menu-icon {
      opacity: 1;
      color: #202020;
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-item.active .menu-icon {
      color: #ffffff;
    }

    .submenu-expanded .menu-arrow {
      color: #202020;
    }

    /* 三级菜单 */
    .menu-level-3 {
      background: #F8F9FA;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-3.collapsed {
      max-height: 0;
    }

    .menu-level-3 .menu-item {
      padding: 6px 16px 6px 52px;
      font-size: 12px;
      color: #202020;
    }

    .menu-level-3 .menu-item .menu-icon {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item:hover {
      background: #E9ECEF;
    }

    .menu-level-3 .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .menu-level-3 .menu-item.active .menu-icon {
      color: #ffffff;
    }

    /* ========== 第三栏：右侧主内容区 ========== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .breadcrumb {
      padding: 0px 20px;
      border-bottom: 1px solid #E6E6e6;
      font-size: 14px;
      display: flex;
      height: 50px;
      line-height: 50px;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
    }

    .breadcrumb-left {
      color: #202020;
    }

    .breadcrumb-sep {
      color: #202020;
      margin: 0 8px;
    }

    .breadcrumb-link {
      color: #0066FF;
      text-decoration: none;
      cursor: pointer;
      font-size: 12px;
    }

    .breadcrumb-link:hover {
      text-decoration: none;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid #E9ECEF;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      background: #F8F9FA;
    }

    .back-icon {
      width: 20px;
      height: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      transition: color 0.2s;
    }

    .back-icon:hover {
      color: #0066FF;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: #E9ECEF;
    }

    .content-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      margin: 20px;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.09);
      overflow: hidden;
    }

    /* 产品列表页面样式 */
    .product-list-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      min-height: 0;
    }

    .btn {
      height: 32px;
      padding: 0 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0066FF;
      color: #fff;
      border-color: #0066FF;
    }

    .btn-primary:hover {
      background: #0052CC;
    }

    .btn-default {
      background: #fff;
      color: #333;
      border-color: #D9D9D9;
    }

    .btn-default:hover {
      border-color: #0066FF;
      color: #0066FF;
    }

    /* 表单区块标题 */
    .form-section-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0F0F0;
    }

    .input-suffix {
      display: inline-flex;
      align-items: center;
      color: #999;
      font-size: 13px;
      margin-left: 8px;
      white-space: nowrap;
      line-height: 32px;
    }

    .field-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
  </style>
  <link rel="stylesheet" href="styles/sandbox-shell.css">
  <link rel="stylesheet" href="styles/ai-sandbox.css">
</head>
<body>


<!-- 主体容器（三栏布局） -->
<div class="container">
  <div id="sandbox-shell" data-active="沙箱实例" data-breadcrumb="沙箱实例 / 创建实例"></div>
  <div class="main-content">
    <div class="breadcrumb">
      <span class="breadcrumb-left" id="menu-name-display">
        <a href="index.html" style="color: #666; text-decoration: none;">沙箱实例</a>
        <span style="margin: 0 8px; color: #999;">&gt;</span>
        <span style="color: #333;">创建沙箱实例</span>
      </span>
    </div>
    <div class="content-body">
      <div class="product-list-page" style="padding: 24px; background: #fff; border-radius: 4px; height: 100%; overflow-y: auto;">

        <!-- 代码沙箱表单 -->
        <div id="panel-code" class="sandbox-type-panel">
          <div class="form-section-title">基本信息</div>

          <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: flex-start; width: 100%;">
            <label class="form-label" style="width: 140px; flex-shrink: 0; margin-bottom: 0; font-weight: 500; line-height: 32px;">沙箱类型 <span class="required">*</span></label>
            <div class="form-control" style="flex: 1; max-width: 100%; min-height: 32px;">
              <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; line-height: 32px;">
                <input type="radio" name="sandboxType" value="code" checked>
                <span>代码沙箱</span>
              </label>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: flex-start; width: 100%;">
            <label class="form-label" style="width: 140px; flex-shrink: 0; margin-bottom: 0; font-weight: 500; line-height: 32px;">模板 <span class="required">*</span></label>
            <div class="form-control" style="flex: 1; max-width: 100%;">
              <select id="sandbox-template-select" class="form-input" style="width: 100%; appearance: auto; background: #fff;">
                <option value="code-interpreter-v1" selected>code-interpreter-v1（代码沙箱）</option>
              </select>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: flex-start; width: 100%;">
            <label class="form-label" style="width: 140px; flex-shrink: 0; margin-bottom: 0; font-weight: 500; line-height: 32px;">CPU <span class="required">*</span></label>
            <div class="form-control" style="flex: 1; max-width: 100%;">
              <select id="sandbox-cpu-select" class="form-input" style="width: 100%; appearance: auto; background: #fff;">
                <option value="2" selected>2 核</option>
                <option value="4">4 核</option>
                <option value="8">8 核</option>
              </select>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: flex-start; width: 100%;">
            <label class="form-label" style="width: 140px; flex-shrink: 0; margin-bottom: 0; font-weight: 500; line-height: 32px;">内存 <span class="required">*</span></label>
            <div class="form-control" style="flex: 1; max-width: 100%;">
              <select id="sandbox-memory-select" class="form-input" style="width: 100%; appearance: auto; background: #fff;">
                <option value="1024" selected>1024 MB</option>
                <option value="2048">2048 MB</option>
                <option value="4096">4096 MB</option>
                <option value="8192">8192 MB</option>
              </select>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: flex-start; width: 100%;">
            <label class="form-label" style="width: 140px; flex-shrink: 0; margin-bottom: 0; font-weight: 500; line-height: 32px;">超时时间 <span class="required">*</span></label>
            <div class="form-control" style="flex: 1; max-width: 100%;">
              <input type="number" id="sandbox-timeout-input" class="form-input" value="600" min="1" style="width: 200px;">
              <span class="input-suffix">秒（沙箱最长运行时间）</span>
            </div>
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px;">
          <a href="index.html" class="btn btn-default">取消</a>
          <button type="button" id="sandbox-form-submit-btn" class="btn btn-primary" onclick="createSandbox()">创建</button>
        </div>

      </div>
    </div>
  </div>
</div>

</div>

<style>
  .form-label {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    margin-bottom: 0;
    font-size: 14px;
    color: #333;
  }
  .form-label .required {
    color: #e53e3e;
    margin-left: 2px;
  }
  .form-control {
    flex: 1;
    display: flex;
    align-items: center;
  }
  .form-input {
    width: 100%;
    height: 32px;
    padding: 0 10px;
    border: 1px solid #D9D9D9;
    border-radius: 4px;
    font-size: 14px;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: #0066FF;
  }
</style>

<script>
  // 复制文本功能
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert('已复制: ' + text);
    });
  }

  // 图标栏交互
  document.querySelectorAll('.icon-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // 一级菜单项点击切换图标状态
  document.querySelectorAll('.menu-level-1 > .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('selected');
    });
  });

  // 子菜单项点击选中交互
  document.querySelectorAll('.submenu-expanded .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      const parentSubmenu = this.closest('.submenu-expanded');
      if (parentSubmenu) {
        parentSubmenu.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
      }
      this.classList.add('active');
    });
  });

  // 创建沙箱实例（展示型，不接真实后端）
  function createSandbox() {
    const template = document.getElementById('sandbox-template-select').value;
    const timeout = document.getElementById('sandbox-timeout-input').value;

    if (!template) {
      alert('请选择模板');
      return;
    }
    if (!timeout || Number(timeout) <= 0) {
      alert('请输入有效的超时时间');
      return;
    }
    alert('沙箱实例创建成功！');
    window.location.href = 'index.html';
  }

  // 菜单折叠交互
  document.querySelectorAll('.menu-item').forEach(item => {
    const arrow = item.querySelector('.menu-arrow');
    if (arrow) {
      const isTopLevel = item.parentElement.classList.contains('menu-level-1');
      if (isTopLevel) {
        return;
      }
      item.style.cursor = 'pointer';
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        const parent = this.parentElement;
        let submenu = parent.querySelector('.menu-level-2');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        submenu = parent.querySelector('.submenu-expanded');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        submenu = parent.querySelector('.menu-level-3');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
      });
    }
  });
</script>
