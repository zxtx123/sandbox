<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建沙箱实例 - 360智汇云</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    a {
      text-decoration: none;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F5F7;
      font-size: 14px;
      color: #202020;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ========== 顶部导航栏 ========== */
    .header {
      height: 50px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(49, 49, 71, 0.26);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 177px;
      height: 28px;
    }

    .logo-text {
      display: none;
    }

    .header-btn {
      padding: 6px 12px;
      border-radius: 4px;
      background: #F8F9FA;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      color: #202020;
      border: 1px #F8F9FA solid;
    }

    .header-btn:hover {
      background: #F8F9FA;
      color: #202020;
    }

    .header-btn.group {
      background: #fff;
      border-color: #D8E0E8;
      color: #202020;
      padding: 6px 10px;
    }

    .header-btn.group:hover {
      background: #F8F9FA;
    }

    .tag {
      background: #EEF6FF;
      color: #0066FF;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .dropdown-arrow {
      margin-left: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-divider {
      width: 1px;
      height: 50px;
      background: #F5F5F5;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-link {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      position: relative;
      cursor: pointer;
      transition: color 0.2s;
    }

    .header-link:hover {
      color: #0066FF;
    }

    .header-link .dot {
      position: absolute;
      top: -2px;
      right: -6px;
      width: 6px;
      height: 6px;
      background: #FF4D4F;
      border-radius: 50%;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .user-info:hover {
      background: #F5F7FA;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0066FF;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    .user-detail {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      color: #333;
      line-height: 1.3;
    }

    .user-sub {
      font-size: 12px;
      color: #8C9AAE;
      line-height: 1.3;
    }

    /* ========== 主体容器（三栏布局） ========== */
    .container {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ========== 第一栏：左侧图标栏 ========== */
    .icon-bar {
      width: 50px;
      background: #2e8cff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-item {
      width: 50px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #E5EAF3;
      transition: all 0.2s;
      background: transparent;
      position: relative;
    }

    /* 前三个图标高度为50px */
    .icon-item:nth-child(1),
    .icon-item:nth-child(2),
    .icon-item:nth-child(3) {
      height: 50px;
    }

    .icon-item:hover {
      background: #0066FF;
      color: #fff;
    }

    .icon-item.active {
      background: #0066FF;
      color: #fff;
    }

    .icon-item .icon-svg {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 前三个图标内的svg大小为20px */
    .icon-item:nth-child(1) .icon-svg,
    .icon-item:nth-child(2) .icon-svg,
    .icon-item:nth-child(3) .icon-svg {
      width: 20px;
      height: 20px;
    }

    .icon-item .icon-text {
      font-size: 9px;
      font-weight: 500;
    }

    .icon-item .icon-label {
      display: none;
      font-size: 10px;
      font-weight: 400;
      margin-top: 2px;
    }

    /* 所有图标显示文字标签 */
    .icon-item .icon-label {
      display: block;
    }

    /* 所有图标改为纵向布局 */
    .icon-item {
      flex-direction: column;
    }

    /* ========== 第二栏：中间菜单栏 ========== */
    .sidebar {
      width: 200px;
      background: #ffffff;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      border-right: 1px solid #E6E6e6;
      color: #202020;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    .sidebar-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 一级菜单 */
    .menu-level-1 {
      color: #202020;
      font-size: 14px;
    }

    .menu-level-1 > .menu-item {
      border-bottom: 1px solid #E6E6e6;
    }

    .menu-level-1 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-1 > .menu-item .menu-arrow {
      pointer-events: none;
    }

    .menu-level-1 > .menu-item .menu-arrow .star-icon {
      width: 18px;
      height: 18px;
      color: #999999;
      fill: transparent;
      transition: all 0.2s ease;
    }

    .menu-level-1 > .menu-item.selected .menu-arrow .star-icon {
      color: #0066FF;
      fill: #0066FF;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 50px;
      line-height: 50px;
      color: #202020;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      color: inherit;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-item.active {
      background: #0066FF;
      color: #fff;
    }

    .menu-item.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #fff;
      border-radius: 1px 0 0 1px;
    }

    .menu-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
    }

    .menu-text {
      flex: 1;
      font-size: inherit;
    }

    .menu-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202020;
      transition: transform 0.2s ease;
    }

    .menu-item.collapsed .menu-arrow {
      transform: rotate(-90deg);
    }

    /* 二级菜单（深色背景） */
    .menu-level-2 {
      background:#ffffff;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-2.collapsed {
      max-height: 0;
    }

    .menu-level-2 .menu-item {
      font-size: 14px;
      color: #202020;
      padding-left: 16px;
    }

    .menu-level-2 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-2 .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 展开的子菜单（浅色背景） */
    .submenu-expanded {
      background: #ffffff;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .submenu-expanded.collapsed {
      max-height: 0;
    }

    .menu-level-2.collapsed .submenu-expanded {
      max-height: 0;
    }

    .submenu-expanded .menu-item {
      color: #202020;
      height: 40px;
      line-height: 40px;
      padding: 0 16px 0 16px;
      font-size: 14px;
    }

    .submenu-expanded .menu-item:hover {
      background: #f5f5f5;
    }

    .submenu-expanded .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .submenu-expanded .menu-item.active::after {
      display: none;
    }

    .submenu-expanded .menu-item.active::before {
      display: none;
    }

    .submenu-expanded .menu-icon {
      opacity: 1;
      color: #202020;
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-item.active .menu-icon {
      color: #ffffff;
    }

    .submenu-expanded .menu-arrow {
      color: #202020;
    }

    /* 三级菜单 */
    .menu-level-3 {
      background: #F8F9FA;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-3.collapsed {
      max-height: 0;
    }

    .menu-level-3 .menu-item {
      padding: 6px 16px 6px 52px;
      font-size: 12px;
      color: #202020;
    }

    .menu-level-3 .menu-item .menu-icon {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item:hover {
      background: #E9ECEF;
    }

    .menu-level-3 .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .menu-level-3 .menu-item.active .menu-icon {
      color: #ffffff;
    }

    /* ========== 第三栏：右侧主内容区 ========== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .breadcrumb {
      padding: 0px 20px;
      border-bottom: 1px solid #E6E6e6;
      font-size: 14px;
      display: flex;
      height: 50px;
      line-height: 50px;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
    }

    .breadcrumb-left {
      color: #202020;
    }

    .breadcrumb-sep {
      color: #202020;
      margin: 0 8px;
    }

    .breadcrumb-link {
      color: #0066FF;
      text-decoration: none;
      cursor: pointer;
      font-size: 12px;
    }

    .breadcrumb-link:hover {
      text-decoration: none;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid #E9ECEF;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      background: #F8F9FA;
    }

    .back-icon {
      width: 20px;
      height: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      transition: color 0.2s;
    }

    .back-icon:hover {
      color: #0066FF;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: #E9ECEF;
    }

    .content-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      margin: 20px;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.09);
      overflow: hidden;
    }

    /* 产品列表页面样式 */
    .product-list-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      min-height: 0;
    }

    .btn {
      height: 32px;
      padding: 0 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0066FF;
      color: #fff;
      border-color: #0066FF;
    }

    .btn-primary:hover {
      background: #0052CC;
    }

    .btn-default {
      background: #fff;
      color: #333;
      border-color: #D9D9D9;
    }

    .btn-default:hover {
      border-color: #0066FF;
      color: #0066FF;
    }

    /* 表单区块标题 */
    .form-section-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0F0F0;
    }

    .input-suffix {
      display: inline-flex;
      align-items: center;
      color: #999;
      font-size: 13px;
      margin-left: 8px;
      white-space: nowrap;
      line-height: 32px;
    }

    .field-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
  </style>
  <link rel="stylesheet" href="styles/ai-sandbox.css">
</head>
<body>
<!-- 顶部导航 -->
<div class="header">
  <div class="header-left">
    <div class="logo">
      <img class="logo-icon" src="img/logo.png" alt="360智汇云" />
    </div>
    <button class="header-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
        <path d="M2 6L8 1L14 6V14C14 14.5304 13.7893 15.0391 13.4142 15.4142C13.0391 15.7893 12.5304 16 12 16H4C3.46957 16 2.96086 15.7893 2.58579 15.4142C2.21071 15.0391 2 14.5304 2 14V6Z" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 16V10H10V16" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>工作台总览</span>
    </button>
    <button class="header-btn group">
      <span class="tag">组</span>
      <span>BD奇麟大数据-系统部</span>
      <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="#202020" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="header-right">
    <a class="header-link">费用</a>
    <a class="header-link">工单<span class="dot"></span></a>
    <a class="header-link">消息<span class="dot"></span></a>
    <a class="header-link">帮助</a>
    <div class="header-divider"></div>
    <div class="user-info">
      <div class="user-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4" fill="currentColor"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="currentColor"/>
        </svg>
      </div>
      <div class="user-detail">
        <div class="user-name">zhangsan</div>
        <div class="user-sub">子账号</div>
      </div>
      <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="#202020" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- 主体容器（三栏布局） -->
<div class="container">
  <!-- 第一栏：左侧图标栏 -->
  <div class="icon-bar">
    <div class="icon-item active" title="全部">
      <div class="icon-svg">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor"/>
        </svg>
      </div>
      <span class="icon-label">全部</span>
    </div>
    <div class="icon-item" title="最近">
      <div class="icon-svg">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M8 4v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-label">最近</span>
    </div>
    <div class="icon-item" title="收藏">
      <div class="icon-svg">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
          <path d="M8 2l2.2 4.4 4.8.7-3.5 3.4.8 4.8L8 13l-4.3 2.3.8-4.8-3.5-3.4 4.8-.7L8 2z" fill="currentColor"/>
        </svg>
      </div>
      <span class="icon-label">收藏</span>
    </div>
    <div class="icon-item" title="标注TLP">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <path d="M2 3h12v10H2V3z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-label">TLP</span>
    </div>
    <div class="icon-item" title="记忆AMS">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-label">AMS</span>
    </div>
    <div class="icon-item" title="TiDB">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <ellipse cx="8" cy="4" rx="5" ry="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M3 4v8c0 1.1 2.2 2 5 2s5-.9 5-2V4" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <span class="icon-label">TiDB</span>
    </div>
    <div class="icon-item" title="对话AIM">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <path d="M3 4h10v8H9l-3 2v-2H3V4z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="6" cy="8" r="1" fill="currentColor"/>
          <circle cx="10" cy="8" r="1" fill="currentColor"/>
        </svg>
      </div>
      <span class="icon-label">AIM</span>
    </div>
    <div class="icon-item" title="智器CIS">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="4" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-label">CIS</span>
    </div>
    <div class="icon-item" title="MongoDB">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M4 5c0-2 2-3 4-3s4 1 4 3c0 4-4 7-4 9" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <span class="icon-label">Mgo</span>
    </div>
    <div class="icon-item" title="云规则">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <path d="M4 11h8v-1H4v1zm0-3h8V7H4v1zm0-3h8V4H4v1z" fill="currentColor"/>
        </svg>
      </div>
      <span class="icon-label">规则</span>
    </div>
    <div class="icon-item" title="计算DSC">
      <div class="icon-svg">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <path d="M2 8c2-3 4-4 6-4s4 1 6 4c-2 3-4 4-6 4s-4-1-6-4z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="8" cy="8" r="2" fill="currentColor"/>
        </svg>
      </div>
      <span class="icon-label">DSC</span>

<script>
  // 复制文本功能
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert('已复制: ' + text);
    });
  }

  // 图标栏交互
  document.querySelectorAll('.icon-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // 一级菜单项点击切换图标状态
  document.querySelectorAll('.menu-level-1 > .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('selected');
    });
  });

  // 子菜单项点击选中交互
  document.querySelectorAll('.submenu-expanded .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      const parentSubmenu = this.closest('.submenu-expanded');
      if (parentSubmenu) {
        parentSubmenu.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
      }
      this.classList.add('active');
    });
  });

  // 创建沙箱实例（展示型，不接真实后端）
  function createSandbox() {
    const template = document.getElementById('sandbox-template-select').value;
    const timeout = document.getElementById('sandbox-timeout-input').value;

    if (!template) {
      alert('请选择模板');
      return;
    }
    if (!timeout || Number(timeout) <= 0) {
      alert('请输入有效的超时时间');
      return;
    }
    alert('沙箱实例创建成功！');
    window.location.href = 'index.html';
  }

  // 菜单折叠交互
  document.querySelectorAll('.menu-item').forEach(item => {
    const arrow = item.querySelector('.menu-arrow');
    if (arrow) {
      const isTopLevel = item.parentElement.classList.contains('menu-level-1');
      if (isTopLevel) {
        return;
      }
      item.style.cursor = 'pointer';
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        const parent = this.parentElement;
        let submenu = parent.querySelector('.menu-level-2');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        submenu = parent.querySelector('.submenu-expanded');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        submenu = parent.querySelector('.menu-level-3');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
      });
    }
  });
</script>
