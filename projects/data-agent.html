<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Agent - 360智汇云</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    a {
      text-decoration: none;
    }
    
    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F5F7;
      font-size: 14px;
      color: #202020;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ========== 顶部导航栏 ========== */
    .header {
      height: 50px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(49, 49, 71, 0.26);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 177px;
      height: 28px;
    }

    .header-btn {
      padding: 6px 12px;
      border-radius: 4px;
      background: #F8F9FA;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      color: #202020;
      border: 1px #F8F9FA solid;
    }

    .header-btn:hover {
      background: #F8F9FA;
      color: #202020;
    }

    .header-btn.group {
      background: #fff;
      border-color: #D8E0E8;
      color: #202020;
      padding: 6px 10px;
    }

    .header-btn.group:hover {
      background: #F8F9FA;
    }

    .tag {
      background: #EEF6FF;
      color: #0066FF;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .dropdown-arrow {
      margin-left: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-divider {
      width: 1px;
      height: 50px;
      background: #F5F5F5;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-link {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      position: relative;
      cursor: pointer;
      transition: color 0.2s;
    }

    .header-link:hover {
      color: #0066FF;
    }

    .header-link .dot {
      position: absolute;
      top: -2px;
      right: -6px;
      width: 6px;
      height: 6px;
      background: #FF4D4F;
      border-radius: 50%;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .user-info:hover {
      background: #F5F7FA;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0066FF;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    .user-detail {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      color: #333;
      line-height: 1.3;
    }

    .user-sub {
      font-size: 12px;
      color: #8C9AAE;
      line-height: 1.3;
    }

    /* ========== 主体容器（三栏布局） ========== */
    .container {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ========== 第一栏：左侧图标栏 ========== */
    .icon-bar {
      width: 50px;
      background: #2e8cff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-item {
      width: 50px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #E5EAF3;
      transition: all 0.2s;
      background: transparent;
      position: relative;
      flex-direction: column;
    }

    .icon-item:nth-child(1),
    .icon-item:nth-child(2),
    .icon-item:nth-child(3) {
      height: 50px;
    }

    .icon-item:hover {
      background: #0066FF;
      color: #fff;
    }

    .icon-item.active {
      background: #0066FF;
      color: #fff;
    }

    .icon-item .icon-svg {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-item:nth-child(1) .icon-svg,
    .icon-item:nth-child(2) .icon-svg,
    .icon-item:nth-child(3) .icon-svg {
      width: 20px;
      height: 20px;
    }

    .icon-item .icon-label {
      display: block;
      font-size: 10px;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ========== 第二栏：中间菜单栏 ========== */
    .sidebar {
      width: 200px;
      background: #ffffff;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      border-right: 1px solid #E6E6e6;
      color: #202020;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .sidebar-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .menu-level-1 {
      color: #202020;
      font-size: 14px;
    }

    .menu-level-1 > .menu-item {
      border-bottom: 1px solid #E6E6e6;
    }

    .menu-level-1 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-1 > .menu-item .menu-arrow .star-icon {
      width: 18px;
      height: 18px;
      color: #999999;
      fill: transparent;
      transition: all 0.2s ease;
    }

    .menu-level-1 > .menu-item.selected .menu-arrow .star-icon {
      color: #0066FF;
      fill: #0066FF;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 50px;
      line-height: 50px;
      color: #202020;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      color: inherit;
      text-decoration: none;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-item.active {
      background: #0066FF;
      color: #fff;
    }

    .menu-item.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #fff;
      border-radius: 1px 0 0 1px;
    }

    .menu-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
    }

    .menu-text {
      flex: 1;
      font-size: inherit;
    }

    .menu-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202020;
      transition: transform 0.2s ease;
    }

    .menu-item.collapsed .menu-arrow {
      transform: rotate(-90deg);
    }

    /* 二级菜单 */
    .menu-level-2 {
      background: #ffffff;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-2.collapsed {
      max-height: 0;
    }

    .menu-level-2 .menu-item {
      font-size: 14px;
      color: #202020;
      padding-left: 16px;
    }

    .menu-level-2 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-2 .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 展开的子菜单 */
    .submenu-expanded {
      background: #ffffff;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .submenu-expanded.collapsed {
      max-height: 0;
    }

    .menu-level-2.collapsed .submenu-expanded {
      max-height: 0;
    }

    .submenu-expanded .menu-item {
      color: #202020;
      height: 40px;
      line-height: 40px;
      padding: 0 16px 0 16px;
      font-size: 14px;
    }

    .submenu-expanded .menu-item:hover {
      background: #f5f5f5;
    }

    .submenu-expanded .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .submenu-expanded .menu-item.active::after {
      display: none;
    }

    .submenu-expanded .menu-item.active::before {
      display: none;
    }

    .submenu-expanded .menu-icon {
      opacity: 1;
      color: #202020;
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-item.active .menu-icon {
      color: #ffffff;
    }

    /* ========== 第三栏：右侧主内容区 ========== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .breadcrumb {
      padding: 0px 20px;
      border-bottom: 1px solid #E9ECEF;
      font-size: 14px;
      display: flex;
      height: 50px;
      line-height: 50px;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
    }

    .breadcrumb-left {
      color: #202020;
    }

    .breadcrumb-link {
      color: #0066FF;
      text-decoration: none;
      cursor: pointer;
      font-size: 12px;
    }

    .breadcrumb-link:hover {
      text-decoration: underline;
    }

    .content-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      margin: 20px;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.09);
      overflow: hidden;
    }

    /* 详情页头部 */
    .detail-header {
      padding: 16px 24px;
      border-bottom: 1px solid #E9ECEF;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      background: #F8F9FA;
      flex-shrink: 0;
    }

    .back-icon {
      width: 20px;
      height: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      transition: color 0.2s;
    }

    .back-icon:hover {
      color: #0066FF;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: #E9ECEF;
    }

    /* 详情页内容 */
    .detail-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0066FF;
      font-size: 24px;
    }
  </style>
</head>

<script>
  // 图标栏交互
  document.querySelectorAll('.icon-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // 一级菜单项点击切换图标状态
  document.querySelectorAll('.menu-level-1 > .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('selected');
    });
  });

  // 菜单展开/收起交互
  document.querySelectorAll('.menu-item').forEach(item => {
    const arrow = item.querySelector('.menu-arrow');
    if (arrow) {
      const isTopLevel = item.parentElement.classList.contains('menu-level-1');
      if (isTopLevel) {
        return;
      }
      
      item.style.cursor = 'pointer';
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        
        const parent = this.parentElement;
        
        let submenu = parent.querySelector('.menu-level-2');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        
        submenu = parent.querySelector('.submenu-expanded');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
      });
    }
  });
</script>
