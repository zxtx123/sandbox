<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API密钥 - 360智汇云</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    a {
      text-decoration: none;
    }
    
    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F5F7;
      font-size: 14px;
      color: #202020;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ========== 顶部导航栏 ========== */
    .header {
      height: 50px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(49, 49, 71, 0.26);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 177px;
      height: 28px;
    }

    .logo-text {
      display: none;
    }

    .header-btn {
      padding: 6px 12px;
      border-radius: 4px;
      background: #F8F9FA;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      color: #202020;
      border: 1px #F8F9FA solid;
    }

    .header-btn:hover {
      background: #F8F9FA;
      color: #202020;
    }

    .header-btn.group {
      background: #fff;
      border-color: #D8E0E8;
      color: #202020;
      padding: 6px 10px;
    }

    .header-btn.group:hover {
      background: #F8F9FA;
    }

    .tag {
      background: #EEF6FF;
      color: #0066FF;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 500;
    }

    .dropdown-arrow {
      margin-left: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-divider {
      width: 1px;
      height: 50px;
      background: #F5F5F5;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-link {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      position: relative;
      cursor: pointer;
      transition: color 0.2s;
    }

    .header-link:hover {
      color: #0066FF;
    }

    .header-link .dot {
      position: absolute;
      top: -2px;
      right: -6px;
      width: 6px;
      height: 6px;
      background: #FF4D4F;
      border-radius: 50%;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .user-info:hover {
      background: #F5F7FA;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0066FF;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    .user-detail {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      color: #333;
      line-height: 1.3;
    }

    .user-sub {
      font-size: 12px;
      color: #8C9AAE;
      line-height: 1.3;
    }

    /* ========== 主体容器（三栏布局） ========== */
    .container {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ========== 第一栏：左侧图标栏 ========== */
    .icon-bar {
      width: 50px;
      background: #2e8cff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-item {
      width: 50px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #E5EAF3;
      transition: all 0.2s;
      background: transparent;
      position: relative;
    }

    /* 前三个图标高度为50px */
    .icon-item:nth-child(1),
    .icon-item:nth-child(2),
    .icon-item:nth-child(3) {
      height: 50px;
    }

    .icon-item:hover {
      background: #0066FF;
      color: #fff;
    }

    .icon-item.active {
      background: #0066FF;
      color: #fff;
    }

    .icon-item .icon-svg {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 前三个图标内的svg大小为20px */
    .icon-item:nth-child(1) .icon-svg,
    .icon-item:nth-child(2) .icon-svg,
    .icon-item:nth-child(3) .icon-svg {
      width: 20px;
      height: 20px;
    }

    .icon-item .icon-text {
      font-size: 9px;
      font-weight: 500;
    }

    .icon-item .icon-label {
      display: none;
      font-size: 10px;
      font-weight: 400;
      margin-top: 2px;
    }

    /* 所有图标显示文字标签 */
    .icon-item .icon-label {
      display: block;
    }

    /* 所有图标改为纵向布局 */
    .icon-item {
      flex-direction: column;
    }

    /* ========== 第二栏：中间菜单栏 ========== */
    .sidebar {
      width: 200px;
      background: #ffffff;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      border-right: 1px solid #E6E6e6;
      color: #202020;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    .sidebar-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 一级菜单 */
    .menu-level-1 {
      color: #202020;
      font-size: 14px;
    }

    .menu-level-1 > .menu-item {
      border-bottom: 1px solid #E6E6e6;
    }

    .menu-level-1 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-1 > .menu-item .menu-arrow {
      pointer-events: none;
    }

    .menu-level-1 > .menu-item .menu-arrow .star-icon {
      width: 18px;
      height: 18px;
      color: #999999;
      fill: transparent;
      transition: all 0.2s ease;
    }

    .menu-level-1 > .menu-item.selected .menu-arrow .star-icon {
      color: #0066FF;
      fill: #0066FF;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 50px;
      line-height: 50px;
      color: #202020;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      color: inherit;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-item.active {
      background: #0066FF;
      color: #fff;
    }

    .menu-item.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #fff;
      border-radius: 1px 0 0 1px;
    }

    .menu-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
    }

    .menu-text {
      flex: 1;
      font-size: inherit;
    }

    .menu-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202020;
      transition: transform 0.2s ease;
    }

    .menu-item.collapsed .menu-arrow {
      transform: rotate(-90deg);
    }

    /* 二级菜单（深色背景） */
    .menu-level-2 {
      background:#ffffff;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-2.collapsed {
      max-height: 0;
    }

    .menu-level-2 .menu-item {
      font-size: 14px;
      color: #202020;
      padding-left: 16px;
    }

    .menu-level-2 > .menu-item .menu-icon {
      display: none;
    }

    .menu-level-2 .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 展开的子菜单（浅色背景） */
    .submenu-expanded {
      background: #ffffff;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .submenu-expanded.collapsed {
      max-height: 0;
    }

    .menu-level-2.collapsed .submenu-expanded {
      max-height: 0;
    }

    .submenu-expanded .menu-item {
      color: #202020;
      height: 40px;
      line-height: 40px;
      padding: 0 16px 0 16px;
      font-size: 14px;
    }

    .submenu-expanded .menu-item:hover {
      background: #f5f5f5;
    }

    .submenu-expanded .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .submenu-expanded .menu-item.active::after {
      display: none;
    }

    .submenu-expanded .menu-item.active::before {
      display: none;
    }

    .submenu-expanded .menu-icon {
      opacity: 1;
      color: #202020;
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .submenu-expanded .menu-item.active .menu-icon {
      color: #ffffff;
    }

    .submenu-expanded .menu-arrow {
      color: #202020;
    }

    /* 三级菜单 */
    .menu-level-3 {
      background: #F8F9FA;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .menu-level-3.collapsed {
      max-height: 0;
    }

    .menu-level-3 .menu-item {
      padding: 6px 16px 6px 52px;
      font-size: 12px;
      color: #202020;
    }

    .menu-level-3 .menu-item .menu-icon {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item .menu-icon svg {
      width: 16px;
      height: 16px;
    }

    .menu-level-3 .menu-item:hover {
      background: #E9ECEF;
    }

    .menu-level-3 .menu-item.active {
      background: #006bff;
      color: #ffffff;
    }

    .menu-level-3 .menu-item.active .menu-icon {
      color: #ffffff;
    }

    /* ========== 第三栏：右侧主内容区 ========== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .breadcrumb {
      padding: 0px 20px;
      border-bottom: 1px solid #E6E6e6;
      font-size: 14px;
      display: flex;
      height: 50px;
      line-height: 50px;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
    }

    .breadcrumb-left {
      color: #202020;
    }

    .breadcrumb-sep {
      color: #202020;
      margin: 0 8px;
    }

    .breadcrumb-link {
      color: #0066FF;
      text-decoration: none;
      cursor: pointer;
      font-size: 12px;
    }

    .breadcrumb-link:hover {
      text-decoration: none;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid #E9ECEF;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      background: #F8F9FA;
    }

    .back-icon {
      width: 20px;
      height: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      transition: color 0.2s;
    }

    .back-icon:hover {
      color: #0066FF;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: #E9ECEF;
    }

    .content-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      margin: 20px;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.09);
      overflow: hidden;
    }

    /* 产品列表页面样式 */
    .product-list-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      min-height: 0;
    }

    .product-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #E9ECEF;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      height: 32px;
      padding: 0 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0066FF;
      color: #fff;
      border-color: #0066FF;
    }

    .btn-primary:hover {
      background: #0052CC;
    }

    .btn-default {
      background: #fff;
      color: #333;
      border-color: #D9D9D9;
    }

    .btn-default:hover {
      border-color: #0066FF;
      color: #0066FF;
    }

    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid #D9D9D9;
      border-radius: 4px;
      padding: 0 12px;
      background: #fff;
    }

    .search-box input {
      border: none;
      outline: none;
      padding: 8px 0;
      font-size: 14px;
      width: 200px;
    }

    .search-box input::placeholder {
      color: #999;
    }

    .search-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin-left: 8px;
      height: 32px;
    }

    .search-btn:hover {
      color: #0066FF;
    }

    .clear-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: #999;
      font-size: 14px;
      padding: 0 0 0 8px;
      margin-left: 4px;
      height: 32px;
      display: flex;
      align-items: center;
    }

    .clear-btn:hover {
      color: #666;
    }

    .refresh-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #D9D9D9;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #666;
      border-radius: 4px;
      margin-left: 8px;
    }

    .refresh-btn:hover {
      border-color: #0066FF;
      color: #0066FF;
    }

    .search-icon {
      color: #999;
      display: flex;
      align-items: center;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #D9D9D9;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #fff;
      color: #666;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: #0066FF;
      color: #0066FF;
    }

    .pagination-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #666;
    }

    .product-table {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .product-table .table-wrapper {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    .product-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .product-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .product-table th {
      background: #F8F9FA;
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      border-bottom: 1px solid #E9ECEF;
      white-space: nowrap;
    }

    .product-table th .filter-icon {
      margin-left: 4px;
      cursor: pointer;
      color: #999;
    }

    .product-table th .filter-icon:hover {
      color: #0066FF;
    }

    .product-table td {
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #F0F0F0;
    }

    .product-table tbody tr:hover {
      background: #F8F9FA;
    }

    /* 空状态样式 */
    .empty-state {
      padding: 60px 0 !important;
      text-align: center;
    }

    .empty-icon {
      color: #D9D9D9;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 14px;
      color: #999;
    }

    /* 翻页组件样式 */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid #E9ECEF;
      background: #fff;
      flex-shrink: 0;
    }

    .pagination-left {
      font-size: 14px;
      color: #666;
    }

    .pagination-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-size-select {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      height: 32px;
      border: 1px solid #D9D9D9;
      border-radius: 4px;
      background: #fff;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }

    .page-size-select:hover {
      border-color: #0066FF;
    }

    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #D9D9D9;
      border-radius: 4px;
      background: #fff;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .page-btn:hover:not(.disabled):not(.active) {
      border-color: #0066FF;
      color: #0066FF;
    }

    .page-btn.active {
      background: #0066FF;
      border-color: #0066FF;
      color: #fff;
    }

    .page-btn.disabled {
      color: #D9D9D9;
      cursor: not-allowed;
    }

    .page-ellipsis {
      min-width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #999;
    }

    .key-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #E9ECEF;
      background: #fff;
      color: #666;
      font-size: 14px;
      flex-shrink: 0;
    }

    .key-summary strong {
      color: #202020;
      font-weight: 500;
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 2px;
      font-size: 12px;
      white-space: nowrap;
    }

    .key-badge.enabled {
      background: #F6FFED;
      color: #52C41A;
    }

    .key-badge.disabled {
      background: #F5F5F5;
      color: #8C9AAE;
    }

    .key-code {
      font-family: Consolas, Monaco, monospace;
      color: #202020;
      white-space: nowrap;
    }

    .key-desc {
      max-width: 220px;
      color: #666;
    }

    .product-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .product-name-text {
      color: #0066FF;
      cursor: pointer;
    }

    .product-name-text:hover {
      text-decoration: underline;
    }

    .product-id {
      color: #999;
      font-size: 12px;
      margin-top: 2px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .status-normal {
      background: #E6F7EE;
      color: #52C41A;
    }

    .status-error {
      background: #FFF1F0;
      color: #FF4D4F;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-normal .status-dot {
      background: #52C41A;
    }

    .status-error .status-dot {
      background: #FF4D4F;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: #F0F5FF;
      color: #0066FF;
      border-radius: 4px;
      font-size: 12px;
    }

    .text-muted {
      color: #999;
    }

    .action-link {
      color: #0066FF;
      text-decoration: none;
      font-size: 13px;
    }
    .action-link:hover {
      text-decoration: underline;
    }
  </style>

<script>
  // 图标栏交互
  document.querySelectorAll('.icon-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // 一级菜单项点击切换图标状态
  document.querySelectorAll('.menu-level-1 > .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      // 切换选中状态
      this.classList.toggle('selected');
    });
  });

  // 子菜单项点击选中交互
  document.querySelectorAll('.submenu-expanded .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      
      // 移除同一子菜单内其他项的active状态
      const parentSubmenu = this.closest('.submenu-expanded');
      if (parentSubmenu) {
        parentSubmenu.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
      }
      
      // 添加当前项的active状态
      this.classList.add('active');
      
      // 更新右侧主内容区的菜单名称
      const menuText = this.querySelector('.menu-text');
      if (menuText) {
        document.getElementById('menu-name-display').textContent = menuText.textContent;
      }
    });
  });

  // 三级菜单项点击选中交互
  document.querySelectorAll('.menu-level-3 .menu-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      
      // 移除所有三级菜单项的active状态
      document.querySelectorAll('.menu-level-3 .menu-item').forEach(i => i.classList.remove('active'));
      
      // 添加当前项的active状态
      this.classList.add('active');
      
      // 更新右侧主内容区的菜单名称
      const menuText = this.querySelector('.menu-text');
      if (menuText) {
        document.getElementById('menu-name-display').textContent = menuText.textContent;
      }
    });
  });

  // 菜单展开/收起交互
  document.querySelectorAll('.menu-item').forEach(item => {
    const arrow = item.querySelector('.menu-arrow');
    if (arrow) {
      // 一级菜单的箭头图标不触发交互
      const isTopLevel = item.parentElement.classList.contains('menu-level-1');
      if (isTopLevel) {
        return; // 跳过一级菜单项
      }
      
      item.style.cursor = 'pointer';
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        
        // 找到父元素
        const parent = this.parentElement;
        
        // 情况1：一级菜单项，控制 menu-level-2
        let submenu = parent.querySelector('.menu-level-2');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        
        // 情况2：二级菜单项，控制 submenu-expanded
        submenu = parent.querySelector('.submenu-expanded');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
        
        // 情况3：三级菜单项
        submenu = parent.querySelector('.menu-level-3');
        if (submenu) {
          submenu.classList.toggle('collapsed');
          this.classList.toggle('collapsed');
          return;
        }
      });
    }
  });

  // 设置策略弹窗
  let currentSandboxName = '';
  document.querySelectorAll('.set-policy-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      currentSandboxName = this.dataset.sandbox;
      document.getElementById('set-sandbox-name').value = currentSandboxName;
      
      openSetPolicyModal();
    });
  });

  function closeSetPolicyModal() {
    document.getElementById('set-policy-modal').classList.remove('active');
    selectedPolicyIds = [];
    setPolicyDropdownState(false);
    renderPolicyTags();
    renderPolicyOptions();
    document.getElementById('selected-services-list').innerHTML = '';
    document.getElementById('selected-services-group').style.display = 'none';
    currentSandboxName = '';
  }

  // 多选下拉框相关函数
  let selectedPolicyIds = [];

  function openSetPolicyModal() {
    const modal = document.getElementById('set-policy-modal');
    modal.classList.add('active');
    selectedPolicyIds = [];
    setPolicyDropdownState(false);
    renderPolicyTags();
    renderPolicyOptions();
    document.getElementById('selected-services-list').innerHTML = '';
    document.getElementById('selected-services-group').style.display = 'none';
    // 设置沙箱名称标签
    document.getElementById('set-sandbox-name').textContent = currentSandboxName || '';
  }

  function setPolicyDropdownState(isOpen) {
    const dropdown = document.getElementById('policy-dropdown');
    const arrow = document.getElementById('policy-arrow');
    const header = document.querySelector('#policy-multi-select .multi-select-header');
    if (dropdown) dropdown.classList.toggle('open', isOpen);
    if (arrow) arrow.classList.toggle('up', isOpen);
    if (header) header.classList.toggle('open', isOpen);
  }

  function togglePolicyDropdown() {
    const dropdown = document.getElementById('policy-dropdown');
    if (!dropdown) return;
    setPolicyDropdownState(!dropdown.classList.contains('open'));
  }

  function selectPolicy(id, name) {
    const policies = JSON.parse(localStorage.getItem('sandboxPolicies') || '[]');
    const targetPolicy = policies.find(p => p.id === id);
    if (!targetPolicy) return;

    const idx = selectedPolicyIds.indexOf(id);
    if (idx > -1) {
      // 取消选中，直接移除
      selectedPolicyIds.splice(idx, 1);
    } else {
      // 选中前校验
      const targetType = targetPolicy.accessType;
      const isIsolated = (targetType === 'sandbox-intranet' || targetType === 'public-network');
      // 已选策略中是否有内网或公网类型
      const selectedPolicies = policies.filter(p => selectedPolicyIds.includes(p.id));
      const hasIsolated = selectedPolicies.some(sp => sp.accessType === 'sandbox-intranet' || sp.accessType === 'public-network');
      if (isIsolated) {
        // 内网或公网策略只能单独选择，不能再选别的
        if (selectedPolicyIds.length > 0) {
          alert('沙箱内网或公网类型策略不支持与其他策略同时选择');
          return;
        }
      } else {
        // 已选内网或公网策略时，不能再选其他策略
        if (hasIsolated) {
          alert('沙箱内网或公网类型策略不支持与其他策略同时选择');
          return;
        }
      }
      selectedPolicyIds.push(id);
    }
    renderPolicyTags();
    renderPolicyOptions();
    updateSelectedServices();
  }

  function removePolicy(id, e) {
    if (e) e.stopPropagation();
    const idx = selectedPolicyIds.indexOf(id);
    if (idx > -1) {
      selectedPolicyIds.splice(idx, 1);
    }
    renderPolicyTags();
    renderPolicyOptions();
    updateSelectedServices();
  }

  function renderPolicyTags() {
    const container = document.getElementById('selected-policy-tags');
    if (!container) return;
    if (selectedPolicyIds.length === 0) {
      container.innerHTML = '<span class="multi-select-placeholder">请选择网络策略</span>';
      return;
    }
    const policies = JSON.parse(localStorage.getItem('sandboxPolicies') || '[]');
    container.innerHTML = selectedPolicyIds.map(id => {
      const policy = policies.find(p => p.id === id);
      const name = policy ? policy.name : id;
      return `<span class="multi-select-tag">${name}<span class="tag-close" onclick="removePolicy('${id}', event)">×</span></span>`;
    }).join('');
  }

  function renderPolicyOptions() {
    const container = document.getElementById('policy-options-list');
    if (!container) return;
    const policies = JSON.parse(localStorage.getItem('sandboxPolicies') || '[]');
    if (policies.length === 0) {
      container.innerHTML = '<div class="multi-select-option" style="color:#999;">暂无网络策略</div>';
      return;
    }
    // 判断当前是否已选了内网或公网策略
    const selectedPolicies = policies.filter(p => selectedPolicyIds.includes(p.id));
    const hasIsolated = selectedPolicies.some(sp => sp.accessType === 'sandbox-intranet' || sp.accessType === 'public-network');
    container.innerHTML = policies.map(p => {
      const isSelected = selectedPolicyIds.includes(p.id);
      const isIsolated = (p.accessType === 'sandbox-intranet' || p.accessType === 'public-network');
      let isDisabled = false;
      if (hasIsolated && !isSelected) {
        // 已选内网/公网时，其他所有选项禁用
        isDisabled = true;
      } else if (!hasIsolated && isIsolated && selectedPolicyIds.length > 0) {
        // 已选了VPC/私网策略时，内网/公网选项禁用
        isDisabled = true;
      }
      const cls = ['multi-select-option'];
      if (isSelected) cls.push('selected');
      if (isDisabled) cls.push('disabled');
      const clickHandler = isDisabled ? '' : `onclick="selectPolicy('${p.id}', '${p.name}')"`;
      return `<div class="${cls.join(' ')}" ${clickHandler}><span class="checkbox"></span>${p.name}</div>`;
    }).join('');
  }

  function updateSelectedServices() {
    const container = document.getElementById('selected-services-list');
    const group = document.getElementById('selected-services-group');
    if (!container || !group) return;
    if (selectedPolicyIds.length === 0) {
      container.innerHTML = '';
      group.style.display = 'none';
      return;
    }
    const policies = JSON.parse(localStorage.getItem('sandboxPolicies') || '[]');
    const selectedPolicies = policies.filter(p => selectedPolicyIds.includes(p.id));
    let html = '';
    selectedPolicies.forEach(p => {
      const accessType = p.accessType || 'sandbox-intranet';
      let objContent = '';
      if (accessType === 'sandbox-intranet' || accessType === 'public-network') {
        objContent = '-';
      } else if (accessType === 'vpc-network') {
        objContent = (p.vpcnetwork || '') + '<br>' + (p.subnet || '');
      } else if (accessType === 'private-connection') {
        objContent = (p.service || '') + '<br>' + (p.domain || '');
      }
      html += '<div style="margin-bottom:8px;"><div style="font-weight:500;color:#333;margin-bottom:2px;">' + (p.name || '') + '</div><div style="color:#666;font-size:13px;padding-left:8px;">' + objContent + '</div></div>';
    });
    container.innerHTML = html || '<span style="color:#999;">暂无访问对象</span>';
    group.style.display = 'block';
  }

  // 点击外部关闭下拉框
  document.addEventListener('click', function(e) {
    const container = document.getElementById('policy-multi-select');
    if (container && !container.contains(e.target)) {
      setPolicyDropdownState(false);
    }
  });

  function createPolicyFromSandbox() {
    if (selectedPolicyIds.length === 0) { alert('请选择网络策略'); return; }

    const policies = JSON.parse(localStorage.getItem('sandboxPolicies') || '[]');
    const selectedPolicies = policies.filter(p => selectedPolicyIds.includes(p.id));
    const policyNames = selectedPolicies.map(p => p.name).join(', ');

    const sandboxPolicies = JSON.parse(localStorage.getItem('sandboxSandboxPolicies') || '[]');
    sandboxPolicies.push({
      sandbox: currentSandboxName,
      policyIds: selectedPolicyIds.slice(),
      policyNames: policyNames
    });
    localStorage.setItem('sandboxSandboxPolicies', JSON.stringify(sandboxPolicies));

    alert('策略关联成功！');
    closeSetPolicyModal();
  }

  document.getElementById('set-policy-modal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeSetPolicyModal();
    }
  });
</script>
<script src="styles/sandbox-shell.js"></script>
<script src="styles/ai-sandbox.js"></script>
</body>
</html>
